version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: skillyme-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-skillyme}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-skillyme_secret}
      POSTGRES_DB: ${POSTGRES_DB:-skillyme_cohort2}
    ports:
      - '5432:5432'
    volumes:
      - skillyme_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-skillyme}']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  skillyme_pg_data:
    driver: local
